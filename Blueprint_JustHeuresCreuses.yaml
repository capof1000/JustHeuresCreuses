blueprint:
  name: JustHeuresCreuses v0.5.9
  description: >
    Active un appareil pendant une plage horaire définie uniquement si sa consommation
    sur les dernières 24h n'a pas atteint le seuil minimal défini.
  domain: automation
  input:
    target_switch:
      name: Équipement à contrôler
      description: L'équipement que le blueprint va allumer ou éteindre (switch ou input_boolean).
      selector:
        entity:
          domain:
            - switch
            - input_boolean
    energy_24h_sensor:
      name: Énergie consommée sur 24h
      description: >
        Capteur représentant la consommation réelle de l'équipement sur les dernières 24 heures glissantes.
      selector:
        entity:
          domain: sensor
    moment_sensor:
      name: Capteur de plage horaire
      description: >
        Capteur binaire indiquant la plage horaire active (ON = plage active).
        Peut être un capteur d'heures creuses, une plage tarifaire, une plage solaire, etc.
      selector:
        entity:
          domain: binary_sensor
    min_energy_reference:
      name: Énergie minimale à assurer sur 24h (kWh)
      description: >
        Si la consommation des dernières 24h est inférieure à ce seuil,
        l'appareil sera allumé pendant la plage horaire active.
      default: 3
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          unit_of_measurement: kWh
    debug_mode:
      name: Mode debug
      description: >
        Active la journalisation détaillée dans le Journal système de Home Assistant
        avec le tag [JustMomentDuJour][DEBUG].
      default: false
      selector:
        boolean: {}

trigger:
  - platform: time_pattern
    minutes: "/1"
  - platform: state
    entity_id: !input moment_sensor

condition: []

variables:
  sw: !input target_switch
  moment: !input moment_sensor
  energy_24h: !input energy_24h_sensor
  min_energy_ref: !input min_energy_reference
  debug: !input debug_mode
  energy_today: "{{ states(energy_24h) | float(0) }}"
  moment_state: "{{ states(moment) }}"
  sw_state: "{{ states(sw) }}"
  sw_domain: "{{ sw.split('.')[0] }}"

action:
  - choose:
      # 🔴 Fin de la plage horaire (on → off) : éteindre l'appareil
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.platform == 'state'
                 and trigger.entity_id == moment
                 and trigger.to_state.state == 'off' }}
        sequence:
          - service: >
              {% if sw_domain == 'switch' %}
                switch.turn_off
              {% elif sw_domain == 'input_boolean' %}
                input_boolean.turn_off
              {% endif %}
            target:
              entity_id: "{{ sw }}"

      # 🟢 Pendant la plage horaire active
      - conditions:
          - condition: state
            entity_id: !input moment_sensor
            state: "on"
        sequence:
          - choose:
              # ⚡ Énergie insuffisante → allumer
              - conditions:
                  - condition: template
                    value_template: "{{ energy_today < min_energy_ref }}"
                sequence:
                  - service: >
                      {% if sw_domain == 'switch' %}
                        switch.turn_on
                      {% elif sw_domain == 'input_boolean' %}
                        input_boolean.turn_on
                      {% endif %}
                    target:
                      entity_id: "{{ sw }}"
            # ✅ Énergie suffisante → éteindre
            default:
              - service: >
                  {% if sw_domain == 'switch' %}
                    switch.turn_off
                  {% elif sw_domain == 'input_boolean' %}
                    input_boolean.turn_off
                  {% endif %}
                target:
                  entity_id: "{{ sw }}"

  # 🐛 Debug
  - if:
      - condition: template
        value_template: "{{ debug }}"
    then:
      - service: system_log.write
        data:
          level: warning
          message: >-
            [JustMomentDuJour][DEBUG] v1.0.0 | Plage={{ moment_state }} | Switch={{ sw_state }} | Energy24h={{ energy_today }} kWh (min {{ min_energy_ref }}) | Trigger={{ trigger.platform }}{% if trigger.platform == 'state' %} ({{ trigger.from_state.state }} → {{ trigger.to_state.state }}){% endif %} | Decision={{ 'OFF (fin de plage)' if (trigger.platform == 'state' and trigger.to_state.state == 'off') else ('Hors plage - aucune action' if moment_state == 'off' else ('ON (needs energy)' if energy_today < min_energy_ref else 'OFF (energy ok)')) }}

mode: single
